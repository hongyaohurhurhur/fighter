<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="slap.css">
    <title>Smack that</title>
</head>

<body>
<div id="wrapper">
  <div id="timer">30</div>
  <div id="score">0</div>
  <div class="mole"></div>
</div>

<div id="sound"></div>
<button>Restart</button>
<!-- <audio id="bgm" autoplay loop hidden>
    <source src="sounds/smackthat.mp3" type="audio/mpeg">
</audio> -->

<script>
    var hits = 0;
    var gameOver = false;
    var count = 30;
    var counter = setInterval(timer, 1000);
    var popTimer = setTimeout("pop()", 3000);

    let images = [
        "punchimages/miku.png",
        "punchimages/miku_lightdmg1.png",
        "punchimages/miku_lightdmg2.png",
        "punchimages/miku_lightdmg3.png",
        "punchimages/miku_dmg1.png",
        "punchimages/miku_dmg2.png",
        "punchimages/miku_dmg3.png",
        "punchimages/miku_dmg4.png",
        "punchimages/miku_dmg5.png",
    ];

    function pop() {
        var x = Math.random() * 500;
        var y = Math.random() * 150;
        $(".mole").css("opacity", 1);
        $(".mole").css({
            top: y,
            left: x
        });
        popTimer = setTimeout("pop()", Math.random() * 3000);
    }

    let index = 0;
    $('.mole').click(function() {
        if (gameOver) return;
        $('#sound').html("<audio autoplay><source src='sounds/punch.wav' type='audio/mpeg'>");
        $(".mole").css("opacity", 0);
        $("#score").html(++hits);
        $(this).css("background-image", "url('" + images[index] + "')");
        if (index >= images.length) {
            gameOver = true;
            clearTimeout(popTimer);
            $("#timer").html("不要再打了");
        }
        index++;
    });
        

    $('button').click(function() {
    count = 30;
    hits = 0;
    $("#score").html(hits);
    gameOver = false;
    });

    function timer() {
    if (count <= 0) {
        gameOver = true;
        clearTimeout(popTimer);
        $("#timer").html("Game&nbsp;Over");
        return;
    }
    $("#timer").html((count<10?"0:0":"0:")+count--);
    }
</script>

</body>
</html>
